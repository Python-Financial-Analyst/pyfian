# Deploy Sphinx docs to GitHub Pages on every push to main.
#
# Prerequisites (one-time setup in repo Settings):
#   Settings → Pages → Source: "GitHub Actions"

name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; don't cancel an in-progress deployment.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache Poetry virtualenvs
        uses: actions/cache@v5
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ runner.os }}-3.12-${{ hashFiles('**/poetry.lock') }}
          restore-keys: poetry-${{ runner.os }}-3.12-

      - name: Install Poetry
        run: |
          pip install --upgrade pip
          pip install poetry==2.1.3
          poetry config virtualenvs.in-project true

      - name: Install dependencies
        run: poetry install

      - name: Build Sphinx docs
        run: poetry run sphinx-build -W docs/source docs/_build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/_build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
